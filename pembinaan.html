<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pembinaan Siswa</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f6fb;
    margin:0;
    padding:20px;
}

.container{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    color:#1f3c88;
}

input, textarea, select{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    margin-top:10px;
}

.btn-simpan{
    background:#2b6cff;
    color:white;
}

.btn-export{
    background:#28a745;
    color:white;
}

.btn-import{
    background:#ff9800;
    color:white;
}

.btn-hapus{
    background:red;
    color:white;
    padding:5px 10px;
}

.kembali{
    background:#666;
    color:white;
    text-decoration:none;
    padding:10px 15px;
    border-radius:5px;
    display:inline-block;
    margin-top:15px;
}

.sp1{
    background:#fff3cd;
    color:#856404;
    padding:5px;
    border-radius:5px;
    font-weight:bold;
}

.sp2{
    background:#ffe0b2;
    color:#e65100;
    padding:5px;
    border-radius:5px;
    font-weight:bold;
}

.sp3{
    background:#f8d7da;
    color:#721c24;
    padding:5px;
    border-radius:5px;
    font-weight:bold;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

table th{
    background:#1f3c88;
    color:white;
    padding:10px;
}

table td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

.summary{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    margin-top:20px;
}

.card{
    background:#eef3ff;
    padding:15px;
    border-radius:10px;
    min-width:150px;
    text-align:center;
}

</style>
</head>

<body>

<div class="container">

<h2>Pembinaan Siswa</h2>

<p>Data pembinaan, pelanggaran, dan Surat Peringatan siswa.</p>

<label>Tanggal</label>
<input type="date" id="tanggal">

<label>Nama Siswa</label>
<input type="text" id="nama" placeholder="Masukkan nama siswa">

<label>Kelas</label>
<input type="text" id="kelas" placeholder="Masukkan kelas">

<label>Jenis Pelanggaran</label>
<select id="pelanggaran">
    <option value="Terlambat">Terlambat</option>
    <option value="Tidak Memakai Seragam">Tidak Memakai Seragam</option>
    <option value="Tidak Masuk Tanpa Keterangan">Tidak Masuk Tanpa Keterangan</option>
    <option value="Merokok">Merokok</option>
    <option value="Perkelahian">Perkelahian</option>
    <option value="Lainnya">Lainnya</option>
</select>

<label>Surat Peringatan</label>
<select id="sp">
    <option value="Tidak Ada">Tidak Ada</option>
    <option value="SP 1">SP 1</option>
    <option value="SP 2">SP 2</option>
    <option value="SP 3">SP 3</option>
</select>

<label>Tindakan Pembinaan</label>
<textarea id="pembinaan" rows="5" placeholder="Masukkan tindakan pembinaan"></textarea>

<button class="btn-simpan" onclick="tambahData()">
Simpan Data
</button>

<button class="btn-export" onclick="exportCSV()">
Export CSV
</button>

<br><br>

<input type="file" id="importCSV" accept=".csv">

<button class="btn-import" onclick="importCSVFile()">
Import CSV
</button>

<table id="tabelPembinaan">

<thead>
<tr>
    <th>No</th>
    <th>Tanggal</th>
    <th>Nama</th>
    <th>Kelas</th>
    <th>Pelanggaran</th>
    <th>Surat Peringatan</th>
    <th>Pembinaan</th>
    <th>Aksi</th>
</tr>
</thead>

<tbody>
</tbody>

</table>

<div class="summary">

<div class="card">
    <h3 id="total">0</h3>
    <p>Total Kasus</p>
</div>

<div class="card">
    <h3 id="sp1">0</h3>
    <p>SP 1</p>
</div>

<div class="card">
    <h3 id="sp2">0</h3>
    <p>SP 2</p>
</div>

<div class="card">
    <h3 id="sp3">0</h3>
    <p>SP 3</p>
</div>

</div>

<a href="dashboard.html" class="kembali">
Kembali ke Dashboard
</a>

</div>

<script>

let nomor = 1;

function tambahData(){

    const tanggal = document.getElementById("tanggal").value;
    const nama = document.getElementById("nama").value;
    const kelas = document.getElementById("kelas").value;
    const pelanggaran = document.getElementById("pelanggaran").value;
    const sp = document.getElementById("sp").value;
    const pembinaan = document.getElementById("pembinaan").value;

    if(tanggal === "" || nama === "" || kelas === "" || pembinaan === ""){
        alert("Semua data harus diisi!");
        return;
    }

    let spClass = "";

    if(sp === "SP 1"){
        spClass = "sp1";
    }else if(sp === "SP 2"){
        spClass = "sp2";
    }else if(sp === "SP 3"){
        spClass = "sp3";
    }

    const tbody = document.querySelector("#tabelPembinaan tbody");

    const row = tbody.insertRow();

    row.innerHTML = `
        <td>${nomor}</td>
        <td>${tanggal}</td>
        <td>${nama}</td>
        <td>${kelas}</td>
        <td>${pelanggaran}</td>
        <td><span class="${spClass}">${sp}</span></td>
        <td>${pembinaan}</td>
        <td>
            <button class="btn-hapus" onclick="hapusRow(this)">
            Hapus
            </button>
        </td>
    `;

    nomor++;

    updateSummary();

    document.getElementById("tanggal").value = "";
    document.getElementById("nama").value = "";
    document.getElementById("kelas").value = "";
    document.getElementById("pembinaan").value = "";

    alert("Data pembinaan berhasil disimpan");
}

function hapusRow(button){

    const row = button.parentElement.parentElement;

    row.remove();

    updateSummary();
}

function updateSummary(){

    const rows = document.querySelectorAll("#tabelPembinaan tbody tr");

    let total = rows.length;
    let totalSP1 = 0;
    let totalSP2 = 0;
    let totalSP3 = 0;

    rows.forEach(row => {

        const sp = row.cells[5].innerText;

        if(sp === "SP 1"){
            totalSP1++;
        }else if(sp === "SP 2"){
            totalSP2++;
        }else if(sp === "SP 3"){
            totalSP3++;
        }

    });

    document.getElementById("total").innerText = total;
    document.getElementById("sp1").innerText = totalSP1;
    document.getElementById("sp2").innerText = totalSP2;
    document.getElementById("sp3").innerText = totalSP3;
}

function exportCSV(){

    const table = document.getElementById("tabelPembinaan");

    let csv = [];

    for(let i = 0; i < table.rows.length; i++){

        let row = [];

        for(let j = 0; j < table.rows[i].cells.length - 1; j++){

            row.push(table.rows[i].cells[j].innerText);

        }

        csv.push(row.join(","));
    }

    const csvFile = new Blob([csv.join("\n")], {
        type: "text/csv"
    });

    const downloadLink = document.createElement("a");

    downloadLink.download = "pembinaan_siswa.csv";

    downloadLink.href = window.URL.createObjectURL(csvFile);

    downloadLink.style.display = "none";

    document.body.appendChild(downloadLink);

    downloadLink.click();
}

function importCSVFile(){

    const fileInput = document.getElementById("importCSV");

    const file = fileInput.files[0];

    if(!file){
        alert("Pilih file CSV terlebih dahulu");
        return;
    }

    const reader = new FileReader();

    reader.onload = function(e){

        const rows = e.target.result.split("\n");

        const tbody = document.querySelector("#tabelPembinaan tbody");

        for(let i = 1; i < rows.length; i++){

            if(rows[i].trim() === "") continue;

            const cols = rows[i].split(",");

            let spClass = "";

            if(cols[5] === "SP 1"){
                spClass = "sp1";
            }else if(cols[5] === "SP 2"){
                spClass = "sp2";
            }else if(cols[5] === "SP 3"){
                spClass = "sp3";
            }

            const row = tbody.insertRow();

            row.innerHTML = `
                <td>${nomor}</td>
                <td>${cols[1]}</td>
                <td>${cols[2]}</td>
                <td>${cols[3]}</td>
                <td>${cols[4]}</td>
                <td><span class="${spClass}">${cols[5]}</span></td>
                <td>${cols[6]}</td>
                <td>
                    <button class="btn-hapus" onclick="hapusRow(this)">
                    Hapus
                    </button>
                </td>
            `;

            nomor++;
        }

        updateSummary();

        alert("Import CSV berhasil");
    };

    reader.readAsText(file);
}

</script>

</body>
</html>
