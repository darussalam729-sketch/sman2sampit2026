<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Izin Siswa - SMART SMAN 2 Sampit</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f6fb;
    margin:0;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

.header{
    text-align:center;
    margin-bottom:20px;
}

.logo{
    width:100px;
}

h2{
    color:#1f3c88;
    margin-top:10px;
}

.subtitle{
    color:#666;
    font-size:14px;
}

input,
select,
textarea{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    padding:12px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin-top:10px;
    font-weight:bold;
}

.btn-simpan{
    background:#2b6cff;
    color:white;
}

.btn-export{
    background:#28a745;
    color:white;
}

.btn-import{
    background:#ff9800;
    color:white;
}

.btn-hapus{
    background:red;
    color:white;
    padding:8px 12px;
}

.btn-kembali{
    background:#666;
    color:white;
    text-decoration:none;
    padding:12px 15px;
    border-radius:8px;
    display:inline-block;
    margin-top:15px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

table th{
    background:#1f3c88;
    color:white;
    padding:12px;
}

table td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

.summary{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    margin-top:20px;
}

.card{
    background:#eef3ff;
    padding:15px;
    border-radius:10px;
    min-width:180px;
    text-align:center;
}

.card h3{
    color:#1f3c88;
    font-size:28px;
}

</style>
</head>

<body>

<div class="container">

<div class="header">

<img src="download.png" alt="Logo Sekolah" class="logo">

<h2>Izin Siswa</h2>

<p class="subtitle">
SMART SMAN 2 Sampit
</p>

</div>

<label>Tanggal</label>
<input type="date" id="tanggal">

<label>Nama Siswa</label>
<input type="text" id="nama" placeholder="Masukkan nama siswa">

<label>Kelas</label>
<input type="text" id="kelas" placeholder="Masukkan kelas">

<label>Jenis Izin</label>
<select id="jenis">
    <option value="Izin">Izin</option>
    <option value="Sakit">Sakit</option>
    <option value="Dispensasi">Dispensasi</option>
</select>

<label>Alasan / Keterangan</label>
<textarea id="keterangan" rows="4"
placeholder="Masukkan alasan izin"></textarea>

<button class="btn-simpan" onclick="tambahData()">
Simpan Data
</button>

<button class="btn-export" onclick="exportCSV()">
Export CSV
</button>

<br><br>

<input type="file" id="importCSV" accept=".csv">

<button class="btn-import" onclick="importCSVFile()">
Import CSV
</button>

<table id="tabelIzin">

<thead>
<tr>
    <th>No</th>
    <th>Tanggal</th>
    <th>Nama</th>
    <th>Kelas</th>
    <th>Jenis Izin</th>
    <th>Keterangan</th>
    <th>Aksi</th>
</tr>
</thead>

<tbody>
</tbody>

</table>

<div class="summary">

<div class="card">
    <h3 id="totalData">0</h3>
    <p>Total Data</p>
</div>

<div class="card">
    <h3 id="totalIzin">0</h3>
    <p>Izin</p>
</div>

<div class="card">
    <h3 id="totalSakit">0</h3>
    <p>Sakit</p>
</div>

<div class="card">
    <h3 id="totalDispensasi">0</h3>
    <p>Dispensasi</p>
</div>

</div>

<a href="dashboard.html" class="btn-kembali">
Kembali ke Dashboard
</a>

</div>

<script>

let nomor = 1;

function tambahData(){

    const tanggal = document.getElementById("tanggal").value;
    const nama = document.getElementById("nama").value;
    const kelas = document.getElementById("kelas").value;
    const jenis = document.getElementById("jenis").value;
    const keterangan = document.getElementById("keterangan").value;

    if(
        tanggal === "" ||
        nama === "" ||
        kelas === "" ||
        keterangan === ""
    ){
        alert("Semua data harus diisi!");
        return;
    }

    const tbody = document.querySelector("#tabelIzin tbody");

    const row = tbody.insertRow();

    row.innerHTML = `
        <td>${nomor}</td>
        <td>${tanggal}</td>
        <td>${nama}</td>
        <td>${kelas}</td>
        <td>${jenis}</td>
        <td>${keterangan}</td>
        <td>
            <button class="btn-hapus"
            onclick="hapusRow(this)">
            Hapus
            </button>
        </td>
    `;

    nomor++;

    updateSummary();

    document.getElementById("tanggal").value = "";
    document.getElementById("nama").value = "";
    document.getElementById("kelas").value = "";
    document.getElementById("keterangan").value = "";

    alert("Data izin berhasil disimpan");
}

function hapusRow(button){

    const row = button.parentElement.parentElement;

    row.remove();

    updateSummary();
}

function updateSummary(){

    const rows = document.querySelectorAll("#tabelIzin tbody tr");

    let total = rows.length;
    let izin = 0;
    let sakit = 0;
    let dispensasi = 0;

    rows.forEach(row => {

        const jenis = row.cells[4].innerText;

        if(jenis === "Izin"){
            izin++;
        }
        else if(jenis === "Sakit"){
            sakit++;
        }
        else if(jenis === "Dispensasi"){
            dispensasi++;
        }

    });

    document.getElementById("totalData").innerText = total;
    document.getElementById("totalIzin").innerText = izin;
    document.getElementById("totalSakit").innerText = sakit;
    document.getElementById("totalDispensasi").innerText = dispensasi;
}

function exportCSV(){

    const table = document.getElementById("tabelIzin");

    let csv = [];

    for(let i = 0; i < table.rows.length; i++){

        let row = [];

        for(let j = 0;
            j < table.rows[i].cells.length - 1;
            j++){

            row.push(table.rows[i].cells[j].innerText);
        }

        csv.push(row.join(","));
    }

    const csvFile = new Blob([csv.join("\n")], {
        type: "text/csv"
    });

    const downloadLink = document.createElement("a");

    downloadLink.download = "izin_siswa.csv";

    downloadLink.href =
    window.URL.createObjectURL(csvFile);

    downloadLink.style.display = "none";

    document.body.appendChild(downloadLink);

    downloadLink.click();
}

function importCSVFile(){

    const fileInput =
    document.getElementById("importCSV");

    const file = fileInput.files[0];

    if(!file){
        alert("Pilih file CSV terlebih dahulu");
        return;
    }

    const reader = new FileReader();

    reader.onload = function(e){

        const rows = e.target.result.split("\n");

        const tbody =
        document.querySelector("#tabelIzin tbody");

        for(let i = 1; i < rows.length; i++){

            if(rows[i].trim() === "") continue;

            const cols = rows[i].split(",");

            const row = tbody.insertRow();

            row.innerHTML = `
                <td>${nomor}</td>
                <td>${cols[1]}</td>
                <td>${cols[2]}</td>
                <td>${cols[3]}</td>
                <td>${cols[4]}</td>
                <td>${cols[5]}</td>
                <td>
                    <button class="btn-hapus"
                    onclick="hapusRow(this)">
                    Hapus
                    </button>
                </td>
            `;

            nomor++;
        }

        updateSummary();

        alert("Import CSV berhasil");
    };

    reader.readAsText(file);
}

</script>

</body>
</html>
