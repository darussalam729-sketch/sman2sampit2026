<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - SMART SMAN 2 Sampit</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f2f6ff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.login-box{
    background:white;
    padding:30px;
    border-radius:15px;
    width:370px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
    text-align:center;
}

.logo{
    width:120px;
    margin-bottom:10px;
}

h2{
    margin-bottom:5px;
    color:#1f3c88;
}

.subtitle{
    color:#666;
    font-size:14px;
    margin-bottom:20px;
}

select,
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
    font-size:15px;
}

button{
    width:100%;
    padding:12px;
    background:#2b6cff;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

button:hover{
    background:#1d56d8;
}

.error{
    color:red;
    text-align:center;
    margin-top:10px;
    font-size:14px;
}

.info-login{
    background:#eef3ff;
    padding:10px;
    border-radius:8px;
    margin-top:15px;
    text-align:left;
    font-size:13px;
}

.footer{
    margin-top:20px;
    font-size:12px;
    color:#888;
}

</style>
</head>

<body>

<div class="login-box">

    <!-- LOGO SEKOLAH -->
    <img src="download.png" alt="Logo SMAN 2 Sampit" class="logo">

    <h2>SMART SMAN 2 Sampit</h2>

    <p class="subtitle">
        Sistem Manajemen Administrasi Sekolah
    </p>

    <!-- PILIH ROLE -->
    <select id="role">
        <option value="">-- Pilih Login Sebagai --</option>
        <option value="admin">Admin</option>
        <option value="guru">Guru</option>
        <option value="siswa">Siswa</option>
        <option value="tas">Tenaga Administrasi Sekolah</option>
    </select>

    <!-- USERNAME -->
    <input type="text" id="username" placeholder="Masukkan Username">

    <!-- PASSWORD -->
    <input type="password" id="password" placeholder="Masukkan Password">

    <!-- BUTTON -->
    <button type="button" onclick="login()">
        Masuk
    </button>

    <!-- ERROR -->
    <div class="error" id="error"></div>

    <!-- INFO LOGIN -->
    <div class="info-login">

        <b>Data Login Demo:</b><br><br>

        <b>Admin</b><br>
        Username: admin<br>
        Password: admin123<br><br>

        <b>Guru</b><br>
        Username: guru<br>
        Password: guru123<br><br>

        <b>Siswa</b><br>
        Username: siswa<br>
        Password: siswa123<br><br>

        <b>TAS</b><br>
        Username: tas<br>
        Password: tas123

    </div>

    <div class="footer">
        © 2026 SMART SMAN 2 Sampit
    </div>

</div>

<script>

function login() {

    let role = document.getElementById("role").value;
    let username = document.getElementById("username").value.trim();
    let password = document.getElementById("password").value.trim();

    // ADMIN
    if(
        role === "admin" &&
        username === "admin" &&
        password === "admin123"
    ){

        alert("Login Admin berhasil");

        window.location.href = "dashboard.html";
    }

    // GURU
    else if(
        role === "guru" &&
        username === "guru" &&
        password === "guru123"
    ){

        alert("Login Guru berhasil");

        window.location.href = "dashboard.html";
    }

    // SISWA
    else if(
        role === "siswa" &&
        username === "siswa" &&
        password === "siswa123"
    ){

        alert("Login Siswa berhasil");

        window.location.href = "dashboard.html";
    }

    // TAS
    else if(
        role === "tas" &&
        username === "tas" &&
        password === "tas123"
    ){

        alert("Login TAS berhasil");

        window.location.href = "dashboard.html";
    }

    else{

        document.getElementById("error").innerHTML =
        "Role, username, atau password salah!";
    }
}

// ENTER KEYBOARD
document.addEventListener("keydown", function(e){

    if(e.key === "Enter"){
        login();
    }

});

</script>

</body>
</html>
