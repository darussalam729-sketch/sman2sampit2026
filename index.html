<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SMART SMAN 2 Sampit</title>
    <!-- Memanggil Google Fonts & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #2b6cff 0%, #1a43a3 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
        }

        .login-card h2 {
            margin-bottom: 10px;
            color: #1a43a3;
            font-weight: 600;
        }

        .login-card p {
            font-size: 0.9rem;
            color: #777;
            margin-bottom: 25px;
        }

        .input-group {
            position: relative;
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 38px;
            color: #2b6cff;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 5px;
            display: block;
            color: #555;
        }

        input, select {
            width: 100%;
            padding: 12px 15px 12px 40px;
            border: 2px solid #eee;
            border-radius: 10px;
            outline: none;
            transition: 0.3s;
            font-family: inherit;
        }

        input:focus, select:focus {
            border-color: #2b6cff;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2b6cff;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background: #1a43a3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(43, 108, 255, 0.4);
        }

        .footer-text {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #aaa;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h2>SMART Access</h2>
    <p>SMAN 2 Sampit - Sistem Informasi Akademik</p>

    <!-- Pilihan Role -->
    <div class="input-group">
        <label>Masuk Sebagai</label>
        <i class="fas fa-user-shield"></i>
        <select id="role">
            <option value="siswa">Siswa</option>
            <option value="guru">Guru</option>
            <option value="admin">Administrator</option>
        </select>
    </div>

    <!-- Username -->
    <div class="input-group">
        <label>Nama Pengguna / NISN</label>
        <i class="fas fa-user"></i>
        <input type="text" id="username" placeholder="Masukkan username">
    </div>

    <!-- Password -->
    <div class="input-group">
        <label>Kata Sandi</label>
        <i class="fas fa-lock"></i>
        <input type="password" id="password" placeholder="••••••••">
    </div>

    <button onclick="handleLogin()">Masuk Ke Sistem</button>

    <div class="footer-text">
        &copy; 2024 SMAN 2 Sampit. All Rights Reserved.
    </div>
</div>

<script>
function handleLogin() {
    const role = document.getElementById('role').value;
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;

    // Validasi Sederhana
    if (user === "" || pass === "") {
        alert("Mohon isi username dan password!");
        return;
    }

    // Simulasi Logika Navigasi Berdasarkan Role
    console.log("Login sebagai:", role);
    
    // Kamu bisa mengarahkan ke halaman berbeda berdasarkan role
    if (role === "admin") {
        window.location.href = "admin_dashboard.html";
    } else if (role === "guru") {
        window.location.href = "guru_dashboard.html";
    } else {
        window.location.href = "siswa_dashboard.html";
    }
}
</script>

</body>
</html>
