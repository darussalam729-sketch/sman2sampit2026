<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - SMART SMAN 2 Sampit</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f2f6ff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.login-box{
    background:white;
    padding:30px;
    border-radius:15px;
    width:350px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
    text-align:center;
}

.logo{
    width:120px;
    margin-bottom:10px;
}

h2{
    margin-bottom:5px;
    color:#1f3c88;
}

.subtitle{
    color:#666;
    font-size:14px;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
    font-size:15px;
}

button{
    width:100%;
    padding:12px;
    background:#2b6cff;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

button:hover{
    background:#1d56d8;
}

.error{
    color:red;
    text-align:center;
    margin-top:10px;
    font-size:14px;
}

.footer{
    margin-top:20px;
    font-size:12px;
    color:#888;
}

</style>
</head>

<body>

<div class="login-box">

    <!-- LOGO SEKOLAH -->
    <img src="download.png" alt="Logo SMAN 2 Sampit" class="logo">

    <h2>SMART SMAN 2 Sampit</h2>

    <p class="subtitle">
        Sistem Manajemen Administrasi Sekolah
    </p>

    <input type="text" id="username" placeholder="Masukkan Username">

    <input type="password" id="password" placeholder="Masukkan Password">

    <button type="button" onclick="login()">
        Masuk
    </button>

    <div class="error" id="error"></div>

    <div class="footer">
        © 2026 SMART SMAN 2 Sampit
    </div>

</div>

<script>

function login() {

    let username = document.getElementById("username").value.trim();
    let password = document.getElementById("password").value.trim();

    if(username === "admin" && password === "admin123"){

        alert("Login berhasil");

        // pindah ke dashboard
        window.location.href = "dashboard.html";

    } else {

        document.getElementById("error").innerHTML =
        "Username atau password salah!";

    }
}

// tekan enter untuk login
document.addEventListener("keydown", function(e){

    if(e.key === "Enter"){
        login();
    }

});

</script>

</body>
</html>
